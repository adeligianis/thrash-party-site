        // 2. THE AUTOMATIC SORTING LOGIC
        // This sorts the array by title (A-Z) before it ever hits the screen
        songs.sort((a, b) => a.title.localeCompare(b.title));
    
        const list = document.getElementById('song-list');
        const search = document.getElementById('songSearch');
    
        function displaySongs(filter = '') {
            list.innerHTML = '';
            const filtered = songs.filter(s => 
                s.title.toLowerCase().includes(filter.toLowerCase()) || 
                s.artist.toLowerCase().includes(filter.toLowerCase())
            );
    
            filtered.forEach(s => {
                list.innerHTML += `
                    <div class="p-4 border-l-4 border-neonPink bg-zinc-900/50 flex justify-between items-center group hover:bg-zinc-800 transition">
                        <div>
                            <div class="font-black italic uppercase text-lg group-hover:text-neonBlue">${s.title}</div>
                            <div class="text-xs font-bold text-zinc-500 uppercase tracking-widest">${s.artist}</div>
                        </div>
                    </div>
                `;
            });
        }
    
        search.addEventListener('input', (e) => displaySongs(e.target.value));
        displaySongs();
    </script>
