    <script>
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
    
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>

    <section class="max-w-6xl mx-auto py-20 px-6">
        <h1 class="text-5xl font-black italic uppercase mb-12 tracking-tighter">The <span class="text-neonPink">Gallery</span></h1>

        <div id="photo-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

    <script>
        const grid = document.getElementById('photo-grid');
        const totalPhotos = 110; 
    
        for (let i = 1; i <= totalPhotos; i++) {
            const fileName = `gig-photo${i}.jpeg`;
            
            const photoHTML = `
                <a href="images/${fileName}" class="glightbox group relative block overflow-hidden border-2 border-zinc-800 hover:border-neonPink transition shadow-lg">
                    <img src="images/${fileName}" alt="Thrash Party Live Shot ${i}" class="w-full h-64 object-cover group-hover:scale-105 transition duration-500 opacity-80 group-hover:opacity-100">
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                        <span class="text-neonPink font-black uppercase italic text-xl shadow-black">View Photo</span>
                    </div>
                </a>
            `;
            grid.innerHTML += photoHTML;
        }
    
        // 3. Initialize Lightbox ONCE after everything is built
        const lightbox = GLightbox({ 
            selector: '.glightbox',
            touchNavigation: true,
            loop: true
        });
    </script>
